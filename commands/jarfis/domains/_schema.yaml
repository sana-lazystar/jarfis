# JARFIS Domain Pack Schema v2
# Published Language — All domain packs must follow this format.
#
# EP1-EP7: 7 Extension Points
# Hooks: Before/After insertion points per Phase
# Fallback: Behavior on agent failure (v3.0: defaults only)

schema_version: 2
supported_schema_versions: [2]
min_core_version: "3.0.0"

# ── Domain Identity ──
# domain:
#   name: string          # Unique identifier (^[a-z][a-z0-9-]{0,30}$)
#   display_name: string  # Display name

# ── EP1: Agent Composition ──
# roles:
#   plan:
#     - persona: string       # Refers to core/personas/
#       skills: [string]      # Refers to domains/{name}/skills/
#       model: string         # opus | sonnet | haiku
#   design:
#     - persona: string
#       skills: [string]
#       model: string
#   implement:
#     - name: string          # Role identifier
#       persona: string
#       skills: [string]
#       external_skills: [string]?  # Cross-domain skill reference ("web/react")
#       model: string
#       commit_prefix: string       # "FE", "BE", "RS", etc.
#       required: boolean           # If true, workflow aborts when missing
#   review:
#     - persona: string
#       skills: [string]
#       model: string
#
# max_skill_tokens: 2500    # Skill token budget (exceeding triggers priority-based truncation)
#
# rules:
#   filter_by_tags: true     # Match framework tags when injecting rules
#   always_include_untagged: true  # Untagged rules are always injected

# ── EP2: Framework Detection ──
# detect:
#   indicators:
#     - file: string?         # Check file existence
#       manifest: string?     # Manifest file path
#       key: string?          # Key within manifest (substring match)
#       framework: string     # Detected framework name
#       confidence: number    # 0.0-1.0

# ── EP3: Quality Gates ──
# quality:
#   linters:
#     - extensions: [string]
#       tool: string
#       args: string?
#   type_checker:
#     config: string?
#     tool: string
#     args: string?

# ── EP4: Commit Format ──
# commit:
#   implementation: string   # "jarfis({ROLE}-{N}):"
#   fix: string              # "jarfis(fix/{ROLE}):"

# ── EP5: MCP Integration ──
# mcp:
#   required: [string]?
#   optional: [string]?

# ── EP6: Test & Build ──
# pipeline:
#   test:
#     runner: string
#     coverage: string?
#   build:
#     check: string

# ── EP7: Domain Lifecycle ──
# lifecycle:
#   install: string?
#   init: string?
#   upgrade: string?

# ── Before/After Hooks (Ratchet R1) ──
# hooks:
#   phase2: { before: string?, after: string? }
#   phase3: { before: string?, after: string? }
#   phase4: { before: string?, after: string? }
#   phase5: { before: string?, after: string? }

# ── Fallback (Ratchet R5) ──
# fallback:
#   on_compose_error: "persona-only"  # When skill loading fails
#   on_skip: "ask-user"               # AskUserQuestion required on skip
